version: "3.8"

services:
  db:
    image: docker.io/postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-applyquest}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: localhost/applyquest-backend:latest
    pull_policy: never
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-applyquest}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: localhost/applyquest-frontend:latest
    pull_policy: never
    restart: always
    ports:
      - "127.0.0.1:7342:80"
    depends_on:
      - backend

volumes:
  db_data:
